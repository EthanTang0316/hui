<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lanbow — Ad Intelligence Command Center</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  /* ═══════════════════════════════════════
     DESIGN TOKENS
     Monochrome — FARS-inspired B&W
     ═══════════════════════════════════════ */
  :root {
    --void: #000000;
    --abyss: #0a0a0a;
    --surface: #0a0a0a;
    --glass: #111111;
    --glass-strong: #111111;
    --card: #111111;
    --elevated: #181818;
    --hover: #1a1a1a;
    --border: #222222;
    --border-lite: #2a2a2a;
    --border-glow: #333333;
    --text-primary: #e5e5e5;
    --text-secondary: #999999;
    --text-muted: #666666;
    --ice: #cccccc;
    --cyan: #ffffff;
    --cyan-bright: #ffffff;
    --green: #999999;
    --amber: #bbbbbb;
    --red: #888888;
    --purple: #aaaaaa;
    --ice-dim: rgba(255,255,255,0.04);
    --cyan-dim: rgba(255,255,255,0.06);
    --green-dim: rgba(255,255,255,0.04);
    --amber-dim: rgba(255,255,255,0.04);
    --red-dim: rgba(255,255,255,0.04);
    --purple-dim: rgba(255,255,255,0.04);
    --glow-cyan: none;
    --glow-green: none;
    --font-mono: 'JetBrains Mono', 'SF Mono', monospace;
    --font-sans: 'Inter', -apple-system, system-ui, sans-serif;
    --font-display: 'Inter', -apple-system, system-ui, sans-serif;
    --ease-out-expo: cubic-bezier(0.16, 1, 0.3, 1);
    --ease-spring: cubic-bezier(0.34, 1.56, 0.64, 1);
  }

  * { margin:0; padding:0; box-sizing:border-box; }
  html { font-size:16px; }

  body {
    background: var(--void);
    color: var(--text-primary);
    font-family: var(--font-sans);
    height: 100vh;
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }

  /* Noise texture overlay — disabled for clean B&W */
  body::before { display:none; }

  /* Scan lines — disabled for clean B&W */
  body::after { display:none; }

  ::selection { background:rgba(255,255,255,0.15); }

  /* ═══ PARTICLE CANVAS — hidden ═══ */
  #particles {
    display:none;
  }

  /* ═══ GLOBAL FLAT ═══ */
  .glass {
    background: var(--glass);
    border: 1px solid var(--border);
  }
  .glass-strong {
    background: var(--glass-strong);
    border: 1px solid var(--border-lite);
  }

  /* ═══ TOPBAR ═══ */
  .topbar {
    height:46px; display:flex; align-items:center; padding:0 20px;
    flex-shrink:0; gap:16px; position:relative; z-index:10;
    background: var(--void);
    border-bottom: 1px solid var(--border);
  }
  .topbar::after { display:none; }
  .topbar-logo { display:flex; align-items:center; gap:10px; flex-shrink:0; cursor:pointer; }
  .topbar-logo:hover span { color:var(--ice); }
  .topbar-logo .pulse-ring {
    width:6px;height:6px;border-radius:50%;background:#666;position:relative;
  }
  .topbar-logo .pulse-ring::after { display:none; }
  .topbar-logo span {
    font-family:var(--font-mono); font-size:12px; font-weight:600;
    letter-spacing:6px; color:var(--text-primary); text-transform:uppercase;
  }
  .ticker-wrap { flex:1; overflow:hidden; position:relative; height:100%; display:flex; align-items:center; }
  .ticker-wrap::before,.ticker-wrap::after { content:''; position:absolute; top:0; bottom:0; width:80px; z-index:1; pointer-events:none; }
  .ticker-wrap::before { left:0; background:linear-gradient(90deg,var(--void),transparent); }
  .ticker-wrap::after { right:0; background:linear-gradient(-90deg,var(--void),transparent); }
  .ticker { position:relative; width:100%; height:100%; display:flex; align-items:center; justify-content:center; font-family:var(--font-mono); font-size:12px; color:var(--text-secondary); }
  .ticker .item { display:flex; align-items:center; gap:8px; cursor:pointer; padding:4px 14px; border-radius:4px; transition:all 0.25s; position:absolute; white-space:nowrap; }
  .ticker .item:hover { background:var(--elevated); }
  .ticker .item .dot { width:6px; height:6px; border-radius:50%; flex-shrink:0; }
  .ticker .highlight { color:#fff; }
  .ticker .warn { color:#fff; }
  .ticker .item.ticker-enter { animation:tickerIn 0.5s var(--ease-out-expo) forwards; }
  .ticker .item.ticker-exit { animation:tickerOut 0.4s ease-in forwards; }
  @keyframes tickerIn { from{opacity:0;transform:translateY(10px)} to{opacity:1;transform:translateY(0)} }
  @keyframes tickerOut { from{opacity:1;transform:translateY(0)} to{opacity:0;transform:translateY(-10px)} }
  .topbar-nav { display:flex; gap:4px; flex-shrink:0; }
  .topbar-nav a {
    font-family:var(--font-mono); font-size:10px; letter-spacing:2px;
    color:var(--text-muted); text-decoration:none; padding:6px 14px;
    border-radius:3px; transition:all 0.25s; cursor:pointer; user-select:none;
    border:1px solid transparent;
  }
  .topbar-nav a:hover { color:var(--text-primary); background:var(--elevated); border-color:var(--border); }
  .topbar-nav a.active { color:var(--text-primary); background:var(--elevated); border-color:var(--border); }

  /* ═══ MAIN ═══ */
  .main { flex:1; display:flex; overflow:hidden; position:relative; z-index:1; }

  /* ═══ SIDEBAR ═══ */
  .sidebar {
    width:220px; flex-shrink:0; display:flex; flex-direction:column;
    border-right:1px solid var(--border);
    background: var(--void);
  }
  .sidebar-header { padding:16px 16px; display:flex; align-items:center; gap:8px; border-bottom:1px solid var(--border); }
  .sidebar-header .icon { font-size:14px; }
  .sidebar-header h3 { font-family:var(--font-mono); font-size:12px; font-weight:600; letter-spacing:3px; }
  .sidebar-header .live {
    font-family:var(--font-mono); font-size:9px; font-weight:600;
    color:var(--text-secondary); letter-spacing:1px; margin-left:auto;
    display:flex; align-items:center; gap:5px;
  }
  .sidebar-header .live::before {
    content:''; width:4px;height:4px;border-radius:50%;background:var(--text-secondary);
    animation:blink 2s infinite;
  }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.3} }
  .sidebar-tabs { display:flex; padding:8px 10px; gap:4px; border-bottom:1px solid var(--border); }
  .sidebar-tabs button {
    font-family:var(--font-mono); font-size:10px; font-weight:600; letter-spacing:1px;
    padding:5px 10px; border:none; border-radius:4px; cursor:pointer;
    transition:all 0.25s; background:transparent; color:var(--text-muted);
  }
  .sidebar-tabs button:hover { color:var(--text-secondary); }
  .sidebar-tabs button.active { background:var(--elevated); color:var(--text-primary); }
  .client-list { flex:1; overflow-y:auto; padding:6px; display:flex; flex-direction:column; gap:2px; }
  .client-list::-webkit-scrollbar { width:2px; }
  .client-list::-webkit-scrollbar-track { background:transparent; }
  .client-list::-webkit-scrollbar-thumb { background:rgba(255,255,255,0.06); border-radius:2px; }
  .client-item {
    padding:10px 10px; border-radius:4px; cursor:pointer;
    transition:all 0.2s; display:flex; align-items:center; gap:9px;
    border:1px solid transparent; user-select:none; position:relative;
  }
  .client-item:hover { background:var(--card); }
  .client-item:active { transform:scale(0.98); }
  .client-item.active {
    background:var(--elevated);
    border-color:var(--border-lite);
  }
  .client-item.active::before { display:none; }
  .client-item .dot { display:none; }
  .client-item .info { flex:1; display:flex; flex-direction:column; gap:2px; }
  .client-item .name {
    font-family:var(--font-mono); font-size:11px; font-weight:500;
    color:var(--text-secondary); transition:color 0.2s;
  }
  .client-item.active .name { color:var(--text-primary); }
  .client-item .meta { font-family:var(--font-mono); font-size:9px; color:var(--text-muted); }
  .blurred { filter:blur(5px); user-select:none; }
  .client-item .task-count {
    font-family:var(--font-mono); font-size:9px; color:var(--text-muted);
    background:var(--card); padding:2px 7px; border-radius:3px; flex-shrink:0;
  }

  /* ═══ CENTER ═══ */
  .center {
    flex:1; display:flex; flex-direction:column; overflow:hidden;
    border-right:1px solid var(--border); min-width:0;
  }
  .task-title-bar {
    padding:14px 20px; border-bottom:1px solid var(--border);
    display:flex; align-items:center; gap:12px;
    background:var(--void);
  }
  .task-title-bar h2 {
    font-family:var(--font-mono); font-size:11px; font-weight:600;
    color:#fff; letter-spacing:2px;
    white-space:nowrap; overflow:hidden; text-overflow:ellipsis; flex:1;
    transition:opacity 0.3s;
  }
  .task-title-bar .tag {
    font-family:var(--font-mono); font-size:9px; font-weight:600;
    padding:3px 10px; border-radius:3px; flex-shrink:0;
  }
  .task-title-bar .expand-btn {
    width:28px;height:28px;border-radius:4px;border:1px solid var(--border-lite);
    background:transparent;color:var(--text-muted);cursor:pointer;
    display:flex;align-items:center;justify-content:center;font-size:13px;
    flex-shrink:0;transition:all 0.25s;
  }
  .task-title-bar .expand-btn:hover { background:var(--elevated); color:var(--text-primary); border-color:var(--border-lite); }
  .task-title-bar .expand-btn:active { transform:scale(0.88); }

  /* Mode Bar */
  .mode-bar {
    display:flex; align-items:center; padding:10px 20px; gap:16px;
    border-bottom:1px solid var(--border);
    background:var(--abyss);
  }
  .mode-pills { display:flex; gap:8px; }
  .mode-pill {
    display:flex; align-items:center; gap:5px;
    font-family:var(--font-mono); font-size:10px; font-weight:500;
    color:var(--text-muted); cursor:default; padding:5px 10px;
    border:1px solid var(--border-lite); border-radius:20px;
    transition:all 0.25s; user-select:none;
  }
  .mode-pill .mode-dot {
    width:5px; height:5px; border-radius:50%;
    background:var(--text-muted); flex-shrink:0; transition:all 0.3s;
  }
  .mode-pill.on { border-color:var(--text-muted); }
  .mode-pill.on .mode-dot { background:var(--green); }
  .mode-pill .mode-hi { font-weight:700; }
  .mode-pill .mode-hi.green { color:var(--text-primary); }
  .mode-pill .mode-hi.cyan { color:var(--cyan); }
  .mode-pill.on.has-queue { border-color:rgba(255,255,255,0.25); }
  .mode-pill.on.has-queue .mode-dot { background:var(--cyan); }
  .mode-bar-sep { width:1px; height:24px; background:var(--border-lite); flex-shrink:0; }
  .mode-metrics { display:flex; gap:16px; flex:1; justify-content:flex-end; }
  .mode-date { margin-left:auto; display:flex; align-items:center; gap:6px; font-family:var(--font-mono); font-size:10px; color:var(--text-muted); }
  .mode-date input[type="date"] {
    background:var(--elevated); border:1px solid var(--border-lite); border-radius:6px;
    color:var(--text-secondary); font-family:var(--font-mono); font-size:10px;
    padding:4px 8px; outline:none; cursor:pointer; transition:border-color 0.2s;
  }
  .mode-date input[type="date"]:hover { border-color:var(--border-glow); }
  .mode-date input[type="date"]:focus { border-color:var(--cyan); }
  .mode-date input[type="date"]::-webkit-calendar-picker-indicator { filter:invert(0.7); cursor:pointer; }
  .mode-metric {
    display:flex; align-items:center; gap:5px;
    font-family:var(--font-mono); font-size:9px; color:var(--text-muted);
    cursor:default; user-select:none;
  }
  .mode-metric .metric-label { font-weight:600; text-transform:uppercase; letter-spacing:0.5px; }
  .mode-metric .metric-value { font-weight:700; font-size:10px; color:var(--text-secondary); }

  /* Task list */
  .task-list-wrap { flex:1; overflow-y:auto; padding:12px 20px; }
  .task-list-wrap::-webkit-scrollbar { width:2px; }
  .task-list-wrap::-webkit-scrollbar-track { background:transparent; }
  .task-list-wrap::-webkit-scrollbar-thumb { background:rgba(255,255,255,0.06); border-radius:2px; }
  .task-row {
    display:flex; align-items:flex-start; gap:10px; padding:10px 12px;
    border-bottom:1px solid var(--border);
    cursor:pointer; border-radius:4px; margin:0 -12px;
    transition:all 0.2s; user-select:none; position:relative;
  }
  .task-row:hover { background:var(--card); }
  .task-row:active { background:var(--elevated); }
  .task-row.expanded { background:var(--card); border-color:var(--cyan-dim); }
  .task-row:last-child { border-bottom:none; }
  .task-status { font-family:var(--font-mono); font-size:11px; flex-shrink:0; margin-top:1px; width:14px; text-align:center; }
  .task-content { flex:1; display:flex; flex-direction:column; gap:4px; }
  .task-content .title { font-size:12px; font-weight:500; color:var(--text-primary); line-height:1.5; }
  .task-content .sub-phases { display:flex; flex-direction:column; gap:3px; margin-top:6px; padding-left:10px; border-left:2px solid var(--border-lite); }
  .task-content .sub-phase { font-family:var(--font-mono); font-size:10px; color:var(--text-muted); padding:2px 0; transition:color 0.2s; }
  .task-content .sub-phase.done { color:var(--text-secondary); }
  .task-content .sub-phase.running { color:var(--text-primary); }
  .task-badge {
    font-family:var(--font-mono); font-size:9px; font-weight:600;
    padding:4px 10px; border-radius:3px; flex-shrink:0; letter-spacing:0.5px;
  }
  .badge-completed { background:var(--green-dim); color:var(--green); }
  .badge-running { background:var(--cyan-dim); color:var(--cyan); position:relative; }
  .badge-running::after { display:none; }
  .badge-pending { background:rgba(255,255,255,0.03); color:var(--text-muted); }
  .badge-queued { background:rgba(245,158,11,0.1); color:var(--amber); }
  .task-row.is-running {
    background:rgba(255,255,255,0.02);
    border-left:2px solid var(--text-secondary);
    padding-left:10px;
  }

  /* Task detail expand */
  .task-detail { overflow:hidden; max-height:0; opacity:0; transition:all 0.4s var(--ease-out-expo); }
  .task-detail.open { max-height:300px; opacity:1; margin-top:10px; }
  .task-detail-inner {
    background:var(--elevated); border:1px solid var(--border-lite);
    border-radius:6px; padding:14px 16px; font-size:11px; line-height:1.6;
    color:var(--text-secondary); display:flex; flex-direction:column; gap:10px;
  }
  .task-detail-inner .detail-row { display:flex; justify-content:space-between; align-items:center; }
  .task-detail-inner .detail-label { font-family:var(--font-mono); font-size:9px; letter-spacing:1.5px; color:var(--text-muted); }
  .task-detail-inner .detail-value { font-family:var(--font-mono); font-size:11px; font-weight:600; }
  .task-detail-inner .detail-bar { height:3px; background:rgba(255,255,255,0.04); border-radius:3px; overflow:hidden; }
  .task-detail-inner .detail-bar .fill { height:100%; border-radius:3px; transition:width 0.8s var(--ease-out-expo); }
  .task-detail-inner .agent-chip {
    font-family:var(--font-mono); font-size:9px; padding:3px 10px;
    border-radius:3px; display:inline-flex; align-items:center; gap:4px;
  }

  /* ═══ RIGHT PANEL ═══ */
  .right-panel {
    width:360px; flex-shrink:0; display:flex; flex-direction:column; overflow:hidden;
    border-right:1px solid var(--border);
  }
  .agent-log-header {
    padding:14px 16px; border-bottom:1px solid var(--border);
    font-family:var(--font-mono); font-size:11px; font-weight:600;
    color:#fff; letter-spacing:2px;
    display:flex; align-items:center; gap:8px;
    background:var(--void);
  }
  .agent-log-header .filter-pills { display:flex; gap:3px; margin-left:auto; }
  .agent-log-header .filter-pill {
    font-size:9px; padding:3px 8px; border-radius:3px; cursor:pointer;
    border:1px solid var(--border); background:transparent;
    color:var(--text-muted); font-family:var(--font-mono);
    transition:all 0.25s; letter-spacing:0;
  }
  .agent-log-header .filter-pill:hover { border-color:var(--border-glow); color:var(--text-secondary); }
  .agent-log-header .filter-pill.active { border-color:var(--border-glow); color:var(--text-primary); background:var(--elevated); }
  .agent-log { flex:1; overflow-y:auto; padding:10px; display:flex; flex-direction:column; gap:10px; }
  .agent-log::-webkit-scrollbar { width:2px; }
  .agent-log::-webkit-scrollbar-track { background:transparent; }
  .agent-log::-webkit-scrollbar-thumb { background:rgba(255,255,255,0.06); border-radius:2px; }
  .log-entry {
    display:flex; flex-direction:column; position:relative;
    padding-left:16px; cursor:pointer; transition:background 0.2s;
  }
  .log-entry::before {
    content:''; position:absolute; left:0; top:0; bottom:0; width:2px;
    background:var(--border-lite); transition:background 0.2s;
  }
  .log-entry.severity-warning::before { background:var(--amber); }
  .log-entry.severity-critical::before { background:var(--text-primary); }
  .log-entry:hover { background:rgba(255,255,255,0.02); }
  .log-entry.entering { animation:slideUp 0.5s var(--ease-out-expo) both; }
  @keyframes slideUp { from{opacity:0;transform:translateY(16px)} to{opacity:1;transform:translateY(0)} }

  .log-header {
    display:flex; align-items:center; gap:6px; padding:8px 10px 4px 10px;
    font-family:var(--font-mono); font-size:10px; color:var(--text-muted);
  }
  .log-header .agent-tag {
    font-size:9px; padding:2px 7px; border-radius:3px;
    font-weight:600; letter-spacing:0.5px;
  }
  .log-header .type-badge {
    margin-left:auto; font-size:8px; font-weight:600; letter-spacing:1px;
    padding:2px 6px; border-radius:2px; text-transform:uppercase;
    background:rgba(255,255,255,0.04); border:1px solid var(--border);
    color:var(--text-muted); font-family:var(--font-mono);
  }
  .log-title {
    padding:0 10px 6px 10px; font-size:11px; font-weight:600;
    color:var(--text-primary); line-height:1.5;
  }
  .log-body {
    padding:0 10px 8px 10px; font-size:11px; line-height:1.65;
    color:var(--text-secondary); display:none;
  }
  .log-body.open { display:block; }
  .log-body strong { color:var(--text-primary); font-weight:600; }
  .log-body .good { color:var(--text-secondary); }
  .log-body .warn { color:var(--text-secondary); }
  .log-body ul { margin:6px 0; padding-left:14px; }
  .log-body li { margin:3px 0; }

  .log-api-tag {
    display:inline-block; background:rgba(255,255,255,0.04);
    border:1px solid var(--border-lite); border-radius:3px;
    padding:1px 7px; font-family:var(--font-mono); font-size:10px;
    color:var(--text-muted); margin:0 10px 8px 10px; cursor:pointer; transition:all 0.2s;
  }
  .log-api-tag:hover { background:var(--elevated); border-color:var(--border-glow); color:var(--text-secondary); }

  /* Creative thumbnails */
  .creative-grid { display:grid; grid-template-columns:repeat(auto-fit, minmax(70px, 1fr)); gap:6px; margin-top:10px; }
  .creative-thumb {
    height:58px; border-radius:4px; position:relative; overflow:hidden;
    border:1px solid var(--border-lite); cursor:pointer;
    transition:all 0.3s var(--ease-out-expo);
  }
  .creative-thumb:hover { transform:translateY(-2px); }
  .creative-thumb:active { transform:scale(0.98); }
  .creative-thumb .overlay {
    position:absolute; bottom:0; left:0; right:0; padding:4px 6px;
    background:linear-gradient(transparent, rgba(0,0,0,0.85));
    font-family:var(--font-mono); font-size:9px; color:rgba(255,255,255,0.8);
  }
  .creative-thumb img { position:absolute; inset:0; width:100%; height:100%; object-fit:cover; }
  .creative-thumb video { position:absolute; inset:0; width:100%; height:100%; object-fit:cover; }
  .creative-thumb.winner { border-color:var(--text-secondary); }
  .creative-thumb.testing { border-color:var(--border-glow); }
  .creative-thumb.fatigued { border-color:var(--text-muted); }

  /* ═══ KPI PANEL ═══ */
  .kpi-panel {
    width:220px; flex-shrink:0; display:flex; flex-direction:column;
    background:var(--void);
    overflow-y:auto;
  }
  .kpi-panel::-webkit-scrollbar { width:2px; }
  .kpi-panel::-webkit-scrollbar-track { background:transparent; }
  .kpi-panel::-webkit-scrollbar-thumb { background:rgba(255,255,255,0.06); border-radius:2px; }
  .kpi-label {
    padding:16px 16px; font-family:var(--font-mono); font-size:10px;
    font-weight:600; letter-spacing:2px; color:#fff;
    border-bottom:1px solid var(--border);
  }
  .kpi-item {
    padding:16px 16px; border-bottom:1px solid var(--border);
    display:flex; flex-direction:column; gap:4px;
    cursor:pointer; transition:all 0.25s; position:relative;
  }
  .kpi-item:hover { background:var(--card); }
  .kpi-item.selected { background:var(--card); }
  .kpi-item.selected::before {
    content:''; position:absolute; left:0; top:14px; bottom:14px; width:2px;
    background:var(--text-secondary);
    border-radius:2px;
  }
  .kpi-item .value {
    font-family:var(--font-mono); font-size:28px; font-weight:700;
    letter-spacing:-0.5px; transition:transform 0.3s var(--ease-spring);
  }
  .kpi-item:hover .value { transform:scale(1.04); }
  .kpi-item .label { font-family:var(--font-mono); font-size:9px; letter-spacing:2px; color:#fff; }
  .kpi-item .delta { font-family:var(--font-mono); font-size:10px; font-weight:600; color:#fff; }
  .kpi-item canvas { width:100%; height:50px; margin-top:6px; }
  .kpi-detail { overflow:hidden; max-height:0; opacity:0; transition:all 0.35s var(--ease-out-expo); }
  .kpi-detail.open { max-height:120px; opacity:1; margin-top:8px; }
  .kpi-detail-inner {
    font-family:var(--font-mono); font-size:10px; color:#fff;
    line-height:1.8; border-top:1px solid var(--border); padding-top:8px;
  }

  /* ═══ BOTTOMBAR ═══ */
  .bottombar {
    height:90px; border-top:1px solid var(--border);
    background:var(--void);
    display:flex; align-items:center; padding:0 28px;
    flex-shrink:0; position:relative; z-index:10; gap:0;
  }
  .bottombar::before { display:none; }

  /* ── Stat Blocks ── */
  .stat-block {
    display:flex; flex-direction:column; align-items:center; gap:5px;
    padding:0 14px; cursor:pointer; transition:all 0.25s;
  }
  .stat-block:hover { transform:translateY(-2px); }
  .stat-block:active { transform:scale(0.95); }
  .stat-block .stat-value {
    font-family:var(--font-mono); font-size:20px; font-weight:700;
    letter-spacing:-0.5px; line-height:1;
    width:58px; height:58px; display:flex; align-items:center; justify-content:center;
    border:1.5px solid rgba(255,255,255,0.06);
    border-radius:50%;
    transition:transform 0.3s var(--ease-spring), border-color 0.3s;
  }
  .stat-block:hover .stat-value { transform:scale(1.08); border-color:rgba(255,255,255,0.15); }
  .stat-block .stat-label {
    font-family:var(--font-mono); font-size:9px; color:var(--text-muted);
    letter-spacing:1.5px;
  }

  /* ── Center Timeline Section ── */
  .timer-section { flex:1; display:flex; flex-direction:column; align-items:center; gap:6px; padding:0 20px; }
  .timer {
    font-family:var(--font-mono); font-size:32px; font-weight:700;
    letter-spacing:2px; display:flex; align-items:baseline; gap:6px;
    color:var(--text-primary);
  }
  .timer .prefix {
    font-family:var(--font-mono); font-size:12px; font-weight:500;
    -webkit-text-fill-color:var(--text-muted);
  }

  /* ── Milestone Timeline Track (infinite feel) ── */
  .milestone-track {
    width:100%; max-width:520px; position:relative; height:28px;
    display:flex; align-items:center; overflow:visible;
  }
  .milestone-line {
    position:absolute; top:50%; left:0; right:0; height:2px;
    background:rgba(255,255,255,0.08);
    transform:translateY(-50%);
  }
  .milestone-line::before, .milestone-line::after {
    content:''; position:absolute; top:0; height:100%; width:60px;
  }
  .milestone-line::before {
    right:100%;
    background:linear-gradient(to right, transparent, rgba(255,255,255,0.08));
  }
  .milestone-line::after {
    left:100%;
    background:linear-gradient(to left, transparent, rgba(255,255,255,0.08));
  }
  .milestone-fill {
    position:absolute; top:50%; left:0; height:2px;
    background:var(--text-secondary);
    transform:translateY(-50%); transition:width 1s ease;
  }
  .milestone-marker {
    position:absolute; top:50%; transform:translate(-50%,-50%);
    z-index:2; display:flex; flex-direction:column; align-items:center;
  }
  .milestone-dot {
    width:12px; height:12px; border-radius:50%;
    background:var(--void); border:2px solid var(--text-muted);
    transition:all 0.3s ease; position:relative;
  }
  .milestone-dot.reached {
    border-color:var(--text-primary);
    background:var(--void);
  }
  .milestone-dot.reached::after {
    content:''; position:absolute; inset:2px; border-radius:50%;
    background:var(--text-primary);
  }
  .milestone-dot.current {
    border-color:var(--text-primary);
    background:var(--void);
    box-shadow:0 0 0 3px rgba(255,255,255,0.08);
  }
  .milestone-dot.current::after {
    content:''; position:absolute; inset:2px; border-radius:50%;
    background:var(--text-primary);
    animation:milestonePulse 2s ease-in-out infinite;
  }
  @keyframes milestonePulse {
    0%,100% { opacity:1; } 50% { opacity:0.4; }
  }
  .milestone-label {
    position:absolute; top:18px; white-space:nowrap;
    font-family:var(--font-mono); font-size:8px; color:var(--text-muted);
    letter-spacing:0.5px; transform:translateX(-50%); left:50%;
  }
  .milestone-dot.reached + .milestone-label,
  .milestone-dot.current + .milestone-label { color:var(--text-secondary); }

  /* ═══ TOAST ═══ */
  .toast {
    position:fixed; top:58px; left:50%;
    transform:translateX(-50%) translateY(-20px);
    background:#ffffff;
    border:1px solid #444; border-radius:4px;
    padding:12px 22px;
    font-family:var(--font-mono); font-size:11px; color:#000000;
    display:flex; align-items:center; gap:10px;
    opacity:0; pointer-events:none;
    transition:all 0.3s ease; z-index:200;
    box-shadow:0 4px 16px rgba(255,255,255,0.1);
  }
  .toast.show { opacity:1; transform:translateX(-50%) translateY(0); pointer-events:auto; }
  .toast:hover { }
  .toast .dot { width:6px;height:6px;border-radius:50%;background:#000;animation:blink 1.5s infinite; }

  /* 告警 toast */
  .toast.alert {
    background:#1a1a1a;
    border:1px solid var(--amber);
    color:#fff;
    box-shadow:0 0 20px rgba(245,158,11,0.25);
  }
  .toast.alert .dot { background:var(--amber); }
  .toast-actions {
    display:none;
    margin-left:8px; gap:6px; align-items:center;
  }
  .toast.alert .toast-actions { display:flex; }
  .toast-confirm, .toast-reject {
    padding:3px 14px;
    border:none; border-radius:3px;
    font-family:var(--font-mono); font-size:10px; font-weight:600;
    cursor:pointer; letter-spacing:0.5px;
    transition:opacity 0.2s;
  }
  .toast-confirm { background:var(--amber); color:#000; }
  .toast-reject { background:transparent; color:var(--amber); border:1px solid var(--amber); }
  .toast-confirm:hover, .toast-reject:hover { opacity:0.75; }

  /* Reject reason dialog */
  .reject-overlay {
    position:fixed; inset:0; background:rgba(0,0,0,0.6); z-index:250;
    display:none; align-items:center; justify-content:center;
    backdrop-filter:blur(4px);
  }
  .reject-overlay.show { display:flex; }
  .reject-dialog {
    background:#1a1a1a; border:1px solid var(--amber); border-radius:6px;
    padding:20px 24px; width:380px;
    box-shadow:0 0 30px rgba(245,158,11,0.2);
    animation:slideUp 0.3s var(--ease-out-expo);
  }
  .reject-title {
    font-family:var(--font-mono); font-size:11px; font-weight:600;
    color:var(--amber); letter-spacing:1.5px; text-transform:uppercase;
    margin-bottom:12px;
  }
  .reject-input {
    width:100%; background:#111; border:1px solid #333; border-radius:3px;
    color:#fff; font-family:var(--font-mono); font-size:11px;
    padding:10px; resize:none; outline:none;
    transition:border-color 0.2s;
  }
  .reject-input:focus { border-color:var(--amber); }
  .reject-input::placeholder { color:#555; }
  .reject-buttons {
    display:flex; justify-content:flex-end; gap:8px; margin-top:12px;
  }
  .reject-cancel, .reject-submit {
    padding:5px 16px; border-radius:3px;
    font-family:var(--font-mono); font-size:10px; font-weight:600;
    cursor:pointer; letter-spacing:0.5px; transition:opacity 0.2s;
  }
  .reject-cancel { background:transparent; color:#888; border:1px solid #444; }
  .reject-cancel:hover { color:#fff; border-color:#666; }
  .reject-submit { background:var(--amber); color:#000; border:none; }
  .reject-submit:hover { opacity:0.85; }

  /* ═══ LIGHTBOX ═══ */
  .lightbox {
    position:fixed; inset:0; background:rgba(0,0,0,0.9); z-index:300;
    display:flex; align-items:center; justify-content:center;
    cursor:pointer;
    opacity:0; visibility:hidden; pointer-events:none;
    transition:opacity 0.3s ease, visibility 0.3s ease;
  }
  .lightbox.show { opacity:1; visibility:visible; pointer-events:auto; }
  .lightbox-inner {
    display:flex; gap:20px; cursor:default; max-height:85vh;
    transform:translateY(16px) scale(0.98); opacity:0;
    transition:transform 0.35s var(--ease-out-expo), opacity 0.3s ease;
  }
  .lightbox.show .lightbox-inner {
    transform:translateY(0) scale(1); opacity:1;
  }
  /* Left: preview + stats */
  .lightbox-left { display:flex; flex-direction:column; gap:14px; width:400px; }
  .lightbox-content {
    width:400px; border-radius:4px; position:relative;
    overflow:hidden; border:1px solid var(--border-lite);
    flex-shrink:0;
    background:#fff;
  }
  .lightbox-info {
    background:var(--elevated); border:1px solid var(--border-lite);
    border-radius:4px; padding:16px 20px; width:100;
  }
  .lightbox-info h4 { font-family:var(--font-sans); font-size:14px; font-weight:600; margin-bottom:6px; }
  .lightbox-info p { font-size:11px; color:var(--text-secondary); line-height:1.6; }
  .lightbox-info .stats { display:flex; gap:20px; margin-top:10px; }
  .lightbox-info .stat { display:flex; flex-direction:column; gap:3px; }
  .lightbox-info .stat .val { font-family:var(--font-mono); font-size:15px; font-weight:700; }
  .lightbox-info .stat .lbl { font-family:var(--font-mono); font-size:9px; color:var(--text-muted); letter-spacing:1.5px; }
  /* Right: optimization history */
  .lightbox-history {
    width:320px; background:var(--elevated); border:1px solid var(--border-lite);
    border-radius:4px; padding:18px 20px;
    overflow-y:auto; max-height:85vh;
  }
  .lightbox-history::-webkit-scrollbar { width:2px; }
  .lightbox-history::-webkit-scrollbar-thumb { background:rgba(255,255,255,0.08); border-radius:2px; }
  .lightbox-history h5 {
    font-family:var(--font-mono); font-size:10px; font-weight:600;
    letter-spacing:2px; color:var(--text-muted); margin-bottom:16px;
  }
  .history-chain { display:flex; flex-direction:column; gap:0; position:relative; }
  .history-node {
    display:flex; gap:12px; position:relative; padding-bottom:20px;
  }
  .history-node:last-child { padding-bottom:0; }
  /* Vertical connector line */
  .history-node::before {
    content:''; position:absolute; left:11px; top:24px; bottom:0;
    width:1px; background:var(--border-lite);
  }
  .history-node:last-child::before { display:none; }
  .history-dot {
    width:22px; height:22px; border-radius:50%; flex-shrink:0;
    display:flex; align-items:center; justify-content:center;
    font-size:9px; position:relative; z-index:1;
    border:1.5px solid var(--border-lite); background:var(--abyss);
  }
  .history-dot.origin { border-color:var(--text-muted); color:var(--text-muted); }
  .history-dot.iteration { border-color:var(--text-secondary); color:var(--text-secondary); background:rgba(255,255,255,0.04); }
  .history-dot.test { border-color:var(--text-primary); color:var(--text-primary); background:rgba(255,255,255,0.06); }
  .history-dot.winner { border-color:var(--text-primary); color:var(--text-primary); background:rgba(255,255,255,0.08); }
  .history-dot.retired { border-color:var(--text-muted); color:var(--text-muted); background:rgba(255,255,255,0.02); }
  .history-dot.active { border-color:var(--text-primary); color:var(--text-primary); background:rgba(255,255,255,0.06); }
  .history-body { flex:1; }
  .history-body .h-title {
    font-size:11px; font-weight:600; color:var(--text-primary); line-height:1.4;
  }
  .history-body .h-meta {
    font-family:var(--font-mono); font-size:9px; color:var(--text-muted);
    margin-top:3px; display:flex; align-items:center; gap:8px;
  }
  .history-body .h-meta .h-agent {
    padding:1px 6px; border-radius:3px; font-weight:600;
  }
  .history-body .h-desc {
    font-size:10px; color:var(--text-secondary); line-height:1.5; margin-top:5px;
  }
  .history-body .h-metrics {
    display:flex; gap:12px; margin-top:6px;
  }
  .history-body .h-metrics .hm {
    font-family:var(--font-mono); font-size:10px;
    display:flex; align-items:center; gap:4px;
  }
  .history-body .h-metrics .hm .hm-val { font-weight:700; }
  .history-body .h-metrics .hm .hm-lbl { color:var(--text-muted); font-size:9px; letter-spacing:0.5px; }
  /* ═══ META AD PREVIEW CARD ═══ */
  .meta-ad {
    width:100%; margin-top:8px; border-radius:4px; overflow:hidden;
    border:1px solid var(--border-lite); background:#fff;
    transition:all 0.25s; cursor:pointer;
  }
  .meta-ad:hover { transform:translateY(-2px); box-shadow:0 8px 24px rgba(0,0,0,0.4); }
  .meta-ad-header {
    display:flex; align-items:center; gap:6px; padding:6px 8px;
    background:#fff;
  }
  .meta-ad-avatar {
    width:22px; height:22px; border-radius:50%; flex-shrink:0;
    display:flex; align-items:center; justify-content:center;
    font-size:9px; font-weight:700; color:#fff;
  }
  .meta-ad-header-info { flex:1; min-width:0; }
  .meta-ad-brand { font-size:8.5px; font-weight:700; color:#1c1e21; line-height:1.2; }
  .meta-ad-sponsored { font-size:7.5px; color:#65676b; display:flex; align-items:center; gap:3px; }
  .meta-ad-dots { color:#65676b; font-size:12px; cursor:pointer; padding:0 2px; }
  .meta-ad-image {
    width:100%; height:100px; position:relative; overflow:hidden;
    display:flex; align-items:center; justify-content:center;
  }
  .meta-ad-image img.ad-media, .meta-ad-image video.ad-media {
    position:absolute; inset:0; width:100%; height:100%; object-fit:cover; z-index:0;
  }
  .meta-ad-image .ad-visual {
    position:absolute; inset:0; display:flex; align-items:center;
    justify-content:center; flex-direction:column; gap:4px; padding:10px; z-index:1;
  }
  .meta-ad-image .ad-headline {
    font-family:var(--font-sans); font-size:12px; font-weight:700;
    color:#fff; text-align:center; text-shadow:0 1px 6px rgba(0,0,0,0.5);
    line-height:1.3; max-width:90%;
  }
  .meta-ad-image .ad-sub {
    font-size:8px; color:rgba(255,255,255,0.7); text-align:center;
  }
  .meta-ad-image .ad-play {
    width:28px; height:28px; border-radius:50%; background:rgba(0,0,0,0.5);
    display:flex; align-items:center; justify-content:center;
    border:2px solid rgba(255,255,255,0.8); position:absolute;
    right:8px; bottom:8px;
  }
  .meta-ad-image .ad-play::after {
    content:''; width:0; height:0;
    border-left:8px solid #fff; border-top:5px solid transparent;
    border-bottom:5px solid transparent; margin-left:2px;
  }
  .meta-ad-image .ad-duration {
    position:absolute; left:6px; bottom:6px; font-family:var(--font-mono);
    font-size:8px; color:#fff; background:rgba(0,0,0,0.6);
    padding:1px 5px; border-radius:3px;
  }
  .meta-ad-image .ad-iteration-badge {
    position:absolute; right:6px; top:6px; font-family:var(--font-mono);
    font-size:7.5px; font-weight:700; padding:2px 7px; border-radius:3px;
    letter-spacing:0.5px;
  }
  .meta-ad-cta-bar {
    display:flex; align-items:center; padding:6px 8px;
    border-top:1px solid #e4e6eb; background:#fff;
  }
  .meta-ad-cta-bar .ad-site {
    flex:0 1 auto; font-size:7.5px; color:#65676b; text-transform:uppercase;
    letter-spacing:0.3px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
  }
  .meta-ad-cta-bar .ad-title {
    flex:1; font-size:8px; font-weight:700; color:#1c1e21;
    white-space:nowrap; overflow:hidden; text-overflow:ellipsis; min-width:0;
  }
  .meta-ad-cta-btn {
    font-size:7.5px; font-weight:700; color:#fff; padding:3px 8px;
    border-radius:4px; flex-shrink:0; letter-spacing:0.3px; white-space:nowrap;
  }
  .meta-ad-engagement {
    display:flex; align-items:center; gap:6px; padding:3px 8px 4px;
    font-size:8px; color:#65676b; background:#fff;
  }
  .meta-ad-engagement .reactions { display:flex; align-items:center; gap:2px; }
  .meta-ad-engagement .reactions span { font-size:8px; }
  /* A/B compare */
  .meta-ab {
    width:100%; margin-top:8px; border-radius:4px; overflow:hidden;
    border:1px solid var(--border-lite); display:flex; position:relative;
  }
  .meta-ab-side {
    flex:1; display:flex; flex-direction:column; align-items:center;
    justify-content:center; padding:10px 6px; gap:4px;
  }
  .meta-ab-side:first-child { border-right:1px solid var(--border-lite); }
  .meta-ab-label { font-family:var(--font-mono); font-size:9px; font-weight:700; letter-spacing:1px; }
  .meta-ab-mini { width:80%; height:40px; border-radius:4px; overflow:hidden; border:1px solid var(--border-lite); }
  .meta-ab-stat { font-family:var(--font-mono); font-size:11px; font-weight:700; }
  .meta-ab-stat-label { font-family:var(--font-mono); font-size:9px; color:var(--text-muted); }
  .meta-ab-vs {
    position:absolute; left:50%; top:50%; transform:translate(-50%,-50%);
    font-family:var(--font-mono); font-size:9px; font-weight:700;
    color:var(--text-muted); background:var(--abyss); padding:2px 6px;
    border-radius:3px; border:1px solid var(--border-lite); z-index:1;
  }
  .lightbox-close {
    position:absolute; top:20px; right:20px;
    width:38px; height:38px; border-radius:50%;
    background:var(--elevated); border:1px solid var(--border-lite);
    color:var(--text-secondary); font-size:18px; cursor:pointer;
    display:flex; align-items:center; justify-content:center;
    transition:all 0.2s; z-index:2;
  }
  .lightbox-close:hover { background:var(--hover); color:var(--text-primary); }

  /* ═══ FULL-SCREEN CREATIVE TIMELINE ═══ */
  .tl-fullscreen {
    position:fixed; inset:0; background:var(--void); z-index:400;
    display:flex; flex-direction:column; overflow:hidden;
    opacity:0; visibility:hidden; pointer-events:none;
    transition:opacity 0.3s ease, visibility 0.3s ease;
  }
  .tl-fullscreen.show { opacity:1; visibility:visible; pointer-events:auto; }
  .tl-header {
    display:flex; align-items:center; padding:0 32px; height:56px;
    border-bottom:1px solid var(--border-lite); background:var(--void);
    flex-shrink:0; z-index:2;
  }
  .tl-header-left { display:flex; align-items:center; gap:14px; flex:1; }
  .tl-back {
    width:32px; height:32px; border-radius:4px; background:transparent;
    border:1px solid var(--border-lite); color:var(--text-secondary);
    font-size:16px; cursor:pointer; display:flex; align-items:center;
    justify-content:center; transition:all 0.2s;
  }
  .tl-back:hover { background:var(--hover); color:var(--text-primary); }
  .tl-creative-name { font-family:var(--font-sans); font-size:16px; font-weight:600; }
  .tl-badge {
    font-family:var(--font-mono); font-size:9px; font-weight:700; letter-spacing:1px;
    padding:3px 10px; border-radius:4px;
  }
  .tl-format { font-family:var(--font-mono); font-size:10px; color:var(--text-muted); }
  .tl-header-right { display:flex; align-items:center; gap:24px; }
  .tl-stat { display:flex; flex-direction:column; align-items:center; gap:1px; }
  .tl-stat .val { font-family:var(--font-mono); font-size:14px; font-weight:700; }
  .tl-stat .lbl { font-family:var(--font-mono); font-size:9px; color:var(--text-muted); letter-spacing:1.5px; }
  .tl-body {
    flex:1; overflow-x:auto; overflow-y:auto; padding:28px 48px 28px; position:relative;
    background:var(--void); cursor:grab;
  }
  .tl-body.dragging { cursor:grabbing; user-select:none; }
  .tl-body::-webkit-scrollbar { height:3px; }
  .tl-body::-webkit-scrollbar-track { background:transparent; }
  .tl-body::-webkit-scrollbar-thumb { background:rgba(255,255,255,0.08); border-radius:3px; }
  .tl-label {
    font-family:var(--font-mono); font-size:10px; font-weight:600;
    letter-spacing:2px; color:var(--text-muted); margin-bottom:20px;
    flex-shrink:0; white-space:nowrap;
  }
  .tl-grid {
    position:relative; z-index:1;
    display:flex; flex-wrap:nowrap; gap:0;
    align-items:flex-start;
  }
  /* inline connector between cards */
  .tl-conn {
    display:flex; align-items:center; justify-content:center;
    width:48px; flex-shrink:0; position:relative; height:40px;
  }
  .tl-conn-line {
    width:100%; height:1px; border-radius:1px;
    background:var(--border-lite);

// PARTICLES — ambient floating dots with pulse response

const particleSys = (function initParticles() {
  const canvas = document.getElementById('particles');
  const ctx = canvas.getContext('2d');
  let w, h, particles = [];
  const COUNT = 60;
  let pulseDecay = 0; // 0-1, decays over time

  function resize() {
    w = canvas.width = window.innerWidth;
    h = canvas.height = window.innerHeight;
  }
  resize();
  window.addEventListener('resize', resize);

  for (let i = 0; i < COUNT; i++) {
    particles.push({
      x: Math.random() * w,
      y: Math.random() * h,
      r: Math.random() * 1.2 + 0.3,
      baseR: Math.random() * 1.2 + 0.3,
      vx: (Math.random() - 0.5) * 0.15,
      vy: (Math.random() - 0.5) * 0.1,
      alpha: Math.random() * 0.25 + 0.05,
      baseAlpha: Math.random() * 0.25 + 0.05,
    });
  }

  function draw() {
    ctx.clearRect(0, 0, w, h);
    if (pulseDecay > 0) pulseDecay *= 0.97;
    if (pulseDecay < 0.01) pulseDecay = 0;
    particles.forEach(p => {
      const boost = pulseDecay;
      p.x += p.vx * (1 + boost * 4);
      p.y += p.vy * (1 + boost * 4);
      if (p.x < 0) p.x = w;
      if (p.x > w) p.x = 0;
      if (p.y < 0) p.y = h;
      if (p.y > h) p.y = 0;
      p.r = p.baseR + boost * 1.5;
      p.alpha = p.baseAlpha + boost * 0.3;
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
      ctx.fillStyle = `rgba(201,217,240,${p.alpha})`;
      ctx.fill();
    });
    requestAnimationFrame(draw);
  }
  draw();

  return {
    pulse() { pulseDecay = 1; }
  };
})();

function selectClient(name) {
  if (name === activeClient) return;
  activeClient = name; expandedTask = null;
  document.querySelectorAll('.client-item').forEach(el => el.classList.remove('active'));
  document.querySelectorAll('.client-item').forEach(el => {
    if (el.querySelector('.name').textContent === name) el.classList.add('active');
  });
  renderCenter(); renderLogs(); renderKpis(); updateTimer(); renderBottomMetrics();
}

function formatTimeAgo(seconds) {
  if (seconds >= 86400) return Math.floor(seconds / 86400) + 'd ago';
  if (seconds >= 3600) return Math.floor(seconds / 3600) + 'h ago';
  if (seconds >= 60) return Math.floor(seconds / 60) + 'm ago';
  return seconds + 's ago';
}
function formatCountdown(seconds) {
  if (seconds <= 0) return '--';
  if (seconds >= 3600) { const h = Math.floor(seconds/3600); const m = Math.floor((seconds%3600)/60); return h + 'h ' + m + 'm'; }
  return Math.floor(seconds / 60) + ' min';
}

function buildModePill(key, label, isOn, hasQueue) {
  const pill = document.createElement('div');
  pill.className = 'mode-pill' + (isOn ? ' on' : '') + (isOn && hasQueue ? ' has-queue' : '');
  pill.dataset.modeKey = key;
  if (key === 'watcher') pill.style.cursor = 'pointer';
  pill.innerHTML = `<span class="mode-dot"></span><span>${label}</span>`;
  pill.addEventListener('mouseenter', (e) => showModeTooltip(e, 'pill', key));
  pill.addEventListener('mouseleave', hideModeTooltip);
  if (key === 'watcher') pill.addEventListener('click', toggleWatcher);
  return pill;
}
function toggleWatcher() {
  const sm = clientsData[activeClient].systemMode;
  sm.watcher = !sm.watcher;
  renderModeBar(sm);
}
function buildModeMetric(key, label, value) {
  const metric = document.createElement('div');
  metric.className = 'mode-metric';
  metric.dataset.metricKey = key;
  metric.innerHTML = `<span class="metric-label">${label}</span><span class="metric-value" data-metric="${key}">${value}</span>`;
  metric.addEventListener('mouseenter', (e) => showModeTooltip(e, 'metric', key));
  metric.addEventListener('mouseleave', hideModeTooltip);
  return metric;
}

function renderModeBar(sm) {
  const el = document.getElementById('modeBar'); el.innerHTML = '';
  const pills = document.createElement('div'); pills.className = 'mode-pills';
  const watcherLabel = sm.watcher ? 'WATCHER <span class="mode-hi green">ON</span>' : 'WATCHER OFF';
  pills.appendChild(buildModePill('watcher', watcherLabel, sm.watcher, false));
  const diagLabel = 'DIAGNOSE <span class="mode-hi cyan">Next ' + sm.scheduledDiag + '</span>';
  pills.appendChild(buildModePill('diagnose', diagLabel, true, false));
  const hasQueue = sm.queueDepth > 0;
  const execLabel = hasQueue ? 'EXECUTOR <span class="mode-hi cyan">' + sm.queueDepth + ' tasks in queue</span>' : 'EXECUTOR Idle';
  pills.appendChild(buildModePill('executor', execLabel, hasQueue, hasQueue));
  el.appendChild(pills);
  const dateWrap = document.createElement('div'); dateWrap.className = 'mode-date';
  const dateInput = document.createElement('input'); dateInput.type = 'date';
  dateInput.value = '2026-02-26';
  dateWrap.appendChild(dateInput);
  el.appendChild(dateWrap);
}

function renderTasks(tasks) {
  const el = document.getElementById('taskList'); el.innerHTML = '';
  el.classList.add('fade-swap'); setTimeout(() => el.classList.remove('fade-swap'), 400);
  tasks.forEach(t => {
    const row = document.createElement('div');
    row.className = `task-row${expandedTask === t.title ? ' expanded' : ''}${t.badge === 'running' ? ' is-running' : ''}`;
    let ph = '';
    if (t.phases) {
      ph = '<div class="sub-phases">' + t.phases.map(p =>
        `<div class="sub-phase${p.done?' done':''}${p.running?' running':''}">${p.running?'● ':p.done?'✓ ':'○ '}${p.text}</div>`
      ).join('') + '</div>';
    }
    const ac = {strategy:'cyan',creative:'purple',budget:'green',insight:'amber'}[t.agent]||'cyan';
    const prog = t.badge==='completed'?100:t.badge==='running'?65:t.badge==='queued'?10:0;
    row.innerHTML = `
      <span class="task-status" style="color:var(--${t.badge==='completed'?'text-secondary':t.badge==='running'?'text-primary':t.badge==='queued'?'amber':'text-muted'})">${t.badge==='completed'?'✓':t.badge==='running'?'▸':t.badge==='queued'?'◈':'○'}</span>
      <div class="task-content">
        <span class="title">${t.title}</span>${ph}
        <div class="task-detail${expandedTask===t.title?' open':''}">
          <div class="task-detail-inner">
            <div class="detail-row"><span class="detail-label">AGENT</span><span class="agent-chip" style="background:var(--${ac}-dim);color:var(--${ac})">${t.agent||'auto'}</span></div>
            <div class="detail-row"><span class="detail-label">DURATION</span><span class="detail-value" style="color:var(--text-secondary)">${t.duration||'—'}</span></div>
            <div class="detail-row"><span class="detail-label">PROGRESS</span><span class="detail-value" style="color:var(--${ac})">${prog}%</span></div>
            <div class="detail-bar"><div class="fill" style="width:${prog}%;background:var(--text-muted)"></div></div>
            <p style="font-size:10px;color:var(--text-muted);line-height:1.5">${t.detail||''}</p>
          </div>
        </div>
      </div>
      <span class="task-badge badge-${t.badge}">${t.badge==='completed'?'Done':t.badge==='running'?'Running':t.badge==='queued'?'Queued':''}</span>`;
    row.addEventListener('click', () => {
      expandedTask = expandedTask === t.title ? null : t.title;
      document.querySelectorAll('.task-detail').forEach(d=>d.classList.remove('open'));
      document.querySelectorAll('.task-row').forEach(r=>r.classList.remove('expanded'));
      if (expandedTask) { row.querySelector('.task-detail').classList.add('open'); row.classList.add('expanded'); }
    });
    el.appendChild(row);
  });
}

      const num = parseFloat(raw.replace(/[^0-9.]/g, ''));

// ═══ CANVAS ═══
function drawSparkline(id, data, color) {
  const cv = document.getElementById(id); if(!cv) return;
  const ctx = cv.getContext('2d');
  const dpr = devicePixelRatio || 1;
  const rect = cv.getBoundingClientRect();
  cv.width = rect.width * dpr; cv.height = rect.height * dpr;
  ctx.scale(dpr, dpr);
  const w = rect.width, h = rect.height;
  const mn = Math.min(...data)*0.95, mx = Math.max(...data)*1.05;
  const pts = data.map((v,i)=>({x:(i/(data.length-1))*w, y:h-((v-mn)/(mx-mn))*h*0.85-h*0.05}));
  // Smooth cubic bezier helper
  function drawSmooth(points) {
    ctx.moveTo(points[0].x, points[0].y);
    for (let i = 0; i < points.length - 1; i++) {
      const p0 = points[Math.max(i-1, 0)];
      const p1 = points[i];
      const p2 = points[i+1];
      const p3 = points[Math.min(i+2, points.length-1)];
      const tension = 0.35;
      const cp1x = p1.x + (p2.x - p0.x) * tension;
      const cp1y = p1.y + (p2.y - p0.y) * tension;
      const cp2x = p2.x - (p3.x - p1.x) * tension;
      const cp2y = p2.y - (p3.y - p1.y) * tension;
      ctx.bezierCurveTo(cp1x, cp1y, cp2x, cp2y, p2.x, p2.y);
    }
  }
  // Fill gradient
  ctx.beginPath(); ctx.moveTo(pts[0].x, h);
  drawSmooth(pts);
  ctx.lineTo(pts[pts.length-1].x, h); ctx.closePath();
  const g = ctx.createLinearGradient(0,0,0,h);
  g.addColorStop(0, color.replace(')',',0.15)').replace('rgb','rgba'));
  g.addColorStop(1, 'transparent');
  ctx.fillStyle = g; ctx.fill();
  // Line
  ctx.beginPath();
  drawSmooth(pts);
  ctx.strokeStyle = color; ctx.lineWidth = 1.5; ctx.stroke();
  // Glow dot
  const l = pts[pts.length-1];
  ctx.beginPath(); ctx.arc(l.x,l.y,3,0,Math.PI*2);
  ctx.fillStyle = color; ctx.fill();
  ctx.beginPath(); ctx.arc(l.x,l.y,7,0,Math.PI*2);
  ctx.fillStyle = color.replace(')',',0.15)').replace('rgb','rgba'); ctx.fill();
}

function formatElapsed(s) {
  const totalH = Math.floor(s / 3600);
  const m = Math.floor((s % 3600) / 60);
  const sec = s % 60;
  const pad = n => String(n).padStart(2,'0');
  return totalH + ':' + pad(m) + ':' + pad(sec);
}
function updateTimer() {
  const d = clientsData[activeClient];
  document.getElementById('timerValue').textContent = formatElapsed(d.elapsed);
}
setInterval(() => {
  Object.values(clientsData).forEach(c => {
    c.elapsed++;
    if (c.systemMode.watcher) {
      c.systemMode.lastEvent++;
      if (c.systemMode.nextDiagIn > 0) c.systemMode.nextDiagIn--;
    }
  });
  updateTimer();
}, 1000);

// Bottom bar count-up + ring animation
function countUp(elId, target, decimals, suffix, dur) {
  const el = document.getElementById(elId); if(!el) return;
  const start = performance.now();
  const unitSpan = el.querySelector('.unit');
  function tick(now) {
    const t = Math.min((now - start) / dur, 1);
    const ease = 1 - Math.pow(1 - t, 3);
    const val = (target * ease).toFixed(decimals);
    if (unitSpan) { el.childNodes[0].textContent = val; }
    else { el.textContent = val + (suffix||''); }
    if (t < 1) requestAnimationFrame(tick);
  }
  requestAnimationFrame(tick);
}

function formatWithComma(elId) {
  const el = document.getElementById(elId);
  if (el) el.textContent = Number(el.textContent).toLocaleString();
}

function renderMilestones(milestones) {
  const track = document.getElementById('milestoneTrack');
  if (!track || !milestones) return;
  // Remove old markers
  track.querySelectorAll('.milestone-marker').forEach(m => m.remove());
  // Find current progress position
  let fillPct = 0;
  milestones.forEach(m => {
    if (m.reached) fillPct = m.pos;
  });
  if (fillPct > 0) fillPct += 5;
  document.getElementById('milestoneFill').style.width = fillPct + '%';
  // Add markers
  milestones.forEach(m => {
    const marker = document.createElement('div');
    marker.className = 'milestone-marker';
    marker.style.left = m.pos + '%';
    let dotClass = 'milestone-dot';
    if (m.current) dotClass += ' current';
    else if (m.reached) dotClass += ' reached';
    marker.innerHTML = `<div class="${dotClass}"></div><div class="milestone-label">${m.label}</div>`;
    track.appendChild(marker);
  });
}

function renderBottomMetrics() {
  const d = clientsData[activeClient];
  countUp('valCreatives', d.creatives, 0, '', 900);
  countUp('valAbTests', d.abTests, 0, '', 900);
  countUp('valActions', d.actions, 0, '', 1000);
  countUp('valInsights', d.insights, 0, '', 1100);
  setTimeout(() => {
    formatWithComma('valInsights');
    formatWithComma('valActions');
  }, 1200);
  renderMilestones(d.milestones);
}
